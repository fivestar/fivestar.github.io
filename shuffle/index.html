layout: default

description: Shuffle Any
---

<header class="header">
  <h1 class="header__headline">Shuffle</h1>
  <p class="header__subheadline">shuffle text lines.</p>
</header>

<article class="content">

  <form class="shuffle-form js-shuffle-form">
    <div class="shuffle-condition">
      <div class="shuffle-condition__field">
        <label for="shuffleGrouping">By:</label>
        <select id="shuffleGrouping" name="grouping">
          <option value="G">N Groups</option>
          <option value="P">N People</option>
        </select>
      </div>

      /
      <div class="shuffle-condition__field">
        <label for="shuffleNumbers">N:</label>
        <input type="number" id="shuffleNumbers" name="numbers" value="4">
      </div>

      /
      <div class="shuffle-condition__field">
        <label for="shuffleGlue">Glue:</label>
        <input type="text" id="shuffleGlue" name="glue" value=", ">
      </div>
    </div>

    <div class="shuffle-view">
      <div class="shuffle-view__input">
          <textarea name="input" class="shuffle-field">Mercedes
Ferrari
Red Bull
Force India
Williams
Renault
Toro Rosso
</textarea>
      </div>
      <div class="shuffle-view__to">
          <button class="btn btn--primary btn--xl js-shuffle-button">&raquo;</button>
      </div>
      <div class="shuffle-view__output">
          <textarea name="output" class="shuffle-field"></textarea>
      </div>

</article>

<script src="{{ "/assets/js/shuffle.js" | relative_url }}"></script>
